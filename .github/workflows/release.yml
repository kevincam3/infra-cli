name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # tag + version-bump commit
      packages: write # publish to GitHub Packages
      issues: write # @semantic-release/github
      pull-requests: write # @semantic-release/github

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Strip CI-incompatible pnpm-workspace settings
        run: |
          sed -i '/^loglevel:/d; /^minimumReleaseAge:/d; /^engineStrict:/d' pnpm-workspace.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec semantic-release
